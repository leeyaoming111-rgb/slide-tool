<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" font-family="Calibri, Carlito, Arial, sans-serif">
  <!-- ============ case-design-system / containers / kpi-tile ============
       One loud number with a short descriptor, optionally an icon. The figure that
       carries the message is the largest type on the slide; everything else supports it.
       Shown stacked in a right-hand KPI panel (ref03). Concrete hex so this pastes into
       PowerPoint as editable, portable shapes. -->

  <rect x="0" y="0" width="340" height="340" rx="3" fill="#F4F6F7"/>

  <!-- tile 1: no icon -->
  <text x="24" y="76" font-size="40" font-weight="800" letter-spacing="-0.5" fill="#14233A">160K</text>
  <text x="24" y="98" font-size="14" font-style="italic" fill="#5B6B79">total units sold over 3 years</text>

  <line x1="24" y1="118" x2="316" y2="118" stroke="#C9D2DA" stroke-width="1"/>

  <!-- tile 2: with icon (thin monochrome line icon, ink, 2px stroke) -->
  <g transform="translate(24,136)" stroke="#14233A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,24 10,12 18,18 32,2"/>
    <polyline points="22,2 32,2 32,12"/>
  </g>
  <text x="72" y="176" font-size="40" font-weight="800" letter-spacing="-0.5" fill="#14233A">$45</text>
  <text x="72" y="198" font-size="14" font-style="italic" fill="#5B6B79">average order value</text>

  <line x1="24" y1="218" x2="316" y2="218" stroke="#C9D2DA" stroke-width="1"/>

  <!-- tile 3: no icon, longer label -->
  <text x="24" y="276" font-size="40" font-weight="800" letter-spacing="-0.5" fill="#14233A">24.5%</text>
  <text x="24" y="298" font-size="14" font-style="italic" fill="#5B6B79">return on invested capital at year 3</text>
</svg>
