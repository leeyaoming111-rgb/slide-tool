<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="Inter, Arial, sans-serif">
  <!-- ============ case-design-system / headlines / kicker ============
       The small uppercase, tracked category label that sits above an action title.
       Navy by default; accent only when the kicker word is the hero; on the activist
       black panel it flips to signal yellow. Concrete hex so this pastes into
       PowerPoint as editable, portable text boxes. -->

  <!-- default: navy -->
  <text x="0" y="34" font-size="12" font-weight="600" letter-spacing="1.2" fill="#1F3A52">FINANCE</text>
  <text x="180" y="34" font-size="13" font-weight="400" fill="#5B6B79">Default &#8212; navy, sits above an action title</text>

  <!-- hero word: accent -->
  <text x="0" y="94" font-size="12" font-weight="600" letter-spacing="1.2" fill="#2E6FB0">IMPACT</text>
  <text x="180" y="94" font-size="13" font-weight="400" fill="#5B6B79">Hero word &#8212; accent, only when this word is the emphasised term</text>

  <!-- activist: on the black panel, signal yellow -->
  <rect x="0" y="130" width="168" height="40" rx="3" fill="#111111"/>
  <text x="18" y="155" font-size="12" font-weight="600" letter-spacing="1.2" fill="#F5E003">GROWTH</text>
  <text x="180" y="155" font-size="13" font-weight="400" fill="#5B6B79">Activist mode &#8212; signal yellow on the black panel</text>

  <!-- usage note -->
  <text x="0" y="204" font-size="10" font-style="italic" fill="#5B6B79">One word, uppercase, 1.2px tracking. Pass normal-case text; the component transforms it.</text>
</svg>
