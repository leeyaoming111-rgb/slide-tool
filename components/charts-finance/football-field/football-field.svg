<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Calibri, Carlito, Arial, sans-serif">
  <!-- ============ case-design-system / charts-finance / football-field ============
       Direct end labels (no legend), method labels on the side, hero range highlighted,
       no gridlines, faint baseline only, source line bottom-left. Colours are concrete
       hex (not CSS vars) so the SVG pastes into PowerPoint as an editable, portable shape. -->

  <!-- title block -->
  <text x="60" y="56" font-size="12" font-weight="600" letter-spacing="1.2" fill="#1F3A52">VALUATION</text>
  <text x="60" y="86" font-size="22" font-weight="700" fill="#14233A">Implied value of $6.00&#8211;$9.00 per share, vs. $5.40 today</text>
  <text x="60" y="110" font-size="13" font-weight="400" fill="#5B6B79">Discounted cash flow and trading comps both point above the current price</text>

  <!-- plot geometry: x domain $0..$13 maps to x 250..900 (50 px per $1) -->

  <!-- faint baseline + axis ticks ($0,2,4,6,8,10,12) -->
  <line x1="250" y1="465" x2="900" y2="465" stroke="#C9D2DA" stroke-width="1"/>
  <g font-size="11" fill="#5B6B79" text-anchor="middle">
    <text x="250" y="484">$0</text>
    <text x="350" y="484">$2</text>
    <text x="450" y="484">$4</text>
    <text x="550" y="484">$6</text>
    <text x="650" y="484">$8</text>
    <text x="750" y="484">$10</text>
    <text x="850" y="484">$12</text>
  </g>

  <!-- method labels on the side (right-aligned), per the no-legend rule -->
  <g font-size="13" font-weight="500" fill="#1F3A52" text-anchor="end">
    <text x="235" y="179">DCF</text>
    <text x="235" y="241">Public trading comps</text>
    <text x="235" y="303">Precedent transactions</text>
    <text x="235" y="365">52-week trading range</text>
    <text x="235" y="427">Analyst price targets</text>
  </g>

  <!-- range bars. DCF is the hero (accent); the rest navy. midpoint tick in white. -->
  <!-- row1 DCF 6.20-11.50 -> x 560..825 -->
  <rect x="560" y="161" width="265" height="28" rx="3" fill="#2E6FB0"/>
  <line x1="692.5" y1="161" x2="692.5" y2="189" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- row2 trading comps 4.80-8.10 -> 490..655 -->
  <rect x="490" y="223" width="165" height="28" rx="3" fill="#1F3A52"/>
  <line x1="572.5" y1="223" x2="572.5" y2="251" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- row3 precedent 5.50-9.40 -> 525..720 -->
  <rect x="525" y="285" width="195" height="28" rx="3" fill="#1F3A52"/>
  <line x1="622.5" y1="285" x2="622.5" y2="313" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- row4 52-week 3.10-7.20 -> 405..610 -->
  <rect x="405" y="347" width="205" height="28" rx="3" fill="#1F3A52"/>
  <line x1="507.5" y1="347" x2="507.5" y2="375" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- row5 analyst 4.00-9.00 -> 450..700 -->
  <rect x="450" y="409" width="250" height="28" rx="3" fill="#1F3A52"/>
  <line x1="575" y1="409" x2="575" y2="437" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- direct low/high value labels at each bar end -->
  <g font-size="12" font-weight="600" fill="#14233A">
    <text x="552" y="179" text-anchor="end">$6.20</text><text x="833" y="179">$11.50</text>
    <text x="482" y="241" text-anchor="end">$4.80</text><text x="663" y="241">$8.10</text>
    <text x="517" y="303" text-anchor="end">$5.50</text><text x="728" y="303">$9.40</text>
    <text x="397" y="365" text-anchor="end">$3.10</text><text x="618" y="365">$7.20</text>
    <text x="442" y="427" text-anchor="end">$4.00</text><text x="708" y="427">$9.00</text>
  </g>

  <!-- current price reference line ($5.40 -> x 520), amber, drawn over bars -->
  <line x1="520" y1="150" x2="520" y2="465" stroke="#E0A13C" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="520" y="142" font-size="12" font-weight="700" fill="#E0A13C" text-anchor="middle">Current $5.40</text>

  <!-- source line -->
  <text x="60" y="520" font-size="10" font-style="italic" fill="#5B6B79">Source: Company filings, FactSet consensus, team estimates. Illustrative figures.</text>
</svg>
