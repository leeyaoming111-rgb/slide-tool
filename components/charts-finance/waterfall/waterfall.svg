<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Inter, Arial, sans-serif">
  <!-- ============ case-design-system / charts-finance / waterfall ============
       A bridge chart that builds a total from a start value through signed deltas
       to an end. Floating delta bars with direct value labels; endpoint bars in
       the hero accent; numbered step chips tie deltas to a narrative (ref04).
       Shows the arithmetic: start -> +deltas -> end. Concrete hex so this pastes
       into PowerPoint as an editable, portable shape. -->

  <!-- start: Current Price $3.93 (endpoint, hero accent) -->
  <rect x="40.6" y="256.7" width="61.7" height="33.3" rx="2" fill="#2E6FB0"/>
  <text x="71.4" y="248.7" font-size="12.5" font-weight="700" fill="#14233A" text-anchor="middle">$3.93</text>
  <text x="71.4" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">Current Price</text>

  <!-- step 1: Shutdown Specs +2.03 (chip 1) -->
  <circle cx="174.3" cy="223.6" r="11" fill="#2E6FB0"/>
  <text x="174.3" y="223.6" font-size="12" font-weight="800" fill="#14233A" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="143.4" y="239.6" width="61.7" height="17.2" rx="2" fill="#1F3A52"/>
  <text x="174.3" y="248.1" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">+$2.03</text>
  <text x="174.3" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">Shutdown Specs</text>

  <!-- step 2: Opex Rationalization +1.64 (chip 2) -->
  <circle cx="277.1" cy="209.7" r="11" fill="#2E6FB0"/>
  <text x="277.1" y="209.7" font-size="12" font-weight="800" fill="#14233A" text-anchor="middle" dominant-baseline="central">2</text>
  <rect x="246.3" y="225.7" width="61.7" height="13.9" rx="2" fill="#1F3A52"/>
  <text x="277.1" y="232.6" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">+$1.64</text>
  <text x="277.1" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">Opex Rationalization</text>

  <!-- step 3: Ad Monetization +5.78 (chip 3) -->
  <circle cx="380" cy="160.8" r="11" fill="#2E6FB0"/>
  <text x="380" y="160.8" font-size="12" font-weight="800" fill="#14233A" text-anchor="middle" dominant-baseline="central">3</text>
  <rect x="349.1" y="176.7" width="61.7" height="48.9" rx="2" fill="#1F3A52"/>
  <text x="380" y="201.2" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">+$5.78</text>
  <text x="380" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">Ad Monetization</text>

  <!-- step 4: AI Value +2.01 (chip 4) -->
  <circle cx="482.9" cy="143.7" r="11" fill="#2E6FB0"/>
  <text x="482.9" y="143.7" font-size="12" font-weight="800" fill="#14233A" text-anchor="middle" dominant-baseline="central">4</text>
  <rect x="452" y="159.7" width="61.7" height="17" rx="2" fill="#1F3A52"/>
  <text x="482.9" y="168.2" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">+$2.01</text>
  <text x="482.9" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">AI Value</text>

  <!-- step 5: Capital Return & Rerate +10.98 (chip 5) -->
  <circle cx="585.7" cy="50.8" r="11" fill="#2E6FB0"/>
  <text x="585.7" y="50.8" font-size="12" font-weight="800" fill="#14233A" text-anchor="middle" dominant-baseline="central">5</text>
  <rect x="554.9" y="66.8" width="61.7" height="93" rx="2" fill="#1F3A52"/>
  <text x="585.7" y="113.3" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">+$10.98</text>
  <text x="585.7" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">Capital Return &amp; Rerate</text>

  <!-- end: PF Share Price $26.37 (endpoint, hero accent) -->
  <rect x="657.7" y="66.8" width="61.7" height="223.2" rx="2" fill="#2E6FB0"/>
  <text x="688.6" y="58.8" font-size="12.5" font-weight="700" fill="#14233A" text-anchor="middle">$26.37</text>
  <text x="688.6" y="308" font-size="11" font-weight="500" fill="#14233A" text-anchor="middle">PF Share Price</text>

  <!-- baseline -->
  <line x1="20" y1="290" x2="740" y2="290" stroke="#C9D2DA" stroke-width="1.5"/>
</svg>
