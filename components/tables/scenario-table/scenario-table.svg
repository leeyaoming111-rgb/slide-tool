<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" font-family="Calibri, Carlito, Arial, sans-serif">
  <!-- ============ case-design-system / tables / scenario-table ============
       Bear / base / bull price-target table with coloured column headers
       (red / blue / green, fixed) and aligned numeric rows (ref07). The hero
       column is shaded to subtly highlight the recommended case. Concrete hex
       so this pastes into PowerPoint as editable, portable shapes. -->

  <!-- header row: coloured pills, fixed names -->
  <rect x="230" y="0" width="150" height="30" rx="3" fill="#C0473E"/>
  <text x="305" y="20" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Bear</text>
  <rect x="390" y="0" width="150" height="30" rx="3" fill="#2E6FB0"/>
  <text x="465" y="20" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Base</text>
  <rect x="550" y="0" width="150" height="30" rx="3" fill="#2E8B6F"/>
  <text x="625" y="20" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Bull</text>

  <!-- hero column shading (base) -->
  <rect x="390" y="40" width="150" height="130" fill="#F4F6F7"/>

  <!-- row 1 -->
  <text x="0" y="62" font-size="13" font-weight="600" fill="#14233A">GMV captured, $m</text>
  <text x="305" y="62" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">444</text>
  <text x="465" y="62" font-size="13" font-weight="700" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">1,184</text>
  <text x="625" y="62" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">1,480</text>
  <line x1="230" y1="76" x2="700" y2="76" stroke="#C9D2DA" stroke-width="1"/>

  <!-- row 2 -->
  <text x="0" y="102" font-size="13" font-weight="600" fill="#14233A">Take rate</text>
  <text x="305" y="102" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">15%</text>
  <text x="465" y="102" font-size="13" font-weight="700" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">15%</text>
  <text x="625" y="102" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">15%</text>
  <line x1="230" y1="116" x2="700" y2="116" stroke="#C9D2DA" stroke-width="1"/>

  <!-- row 3 -->
  <text x="0" y="142" font-size="13" font-weight="600" fill="#14233A">Year-3 revenue, $m</text>
  <text x="305" y="142" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">66.6</text>
  <text x="465" y="142" font-size="13" font-weight="700" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">177.6</text>
  <text x="625" y="142" font-size="13" fill="#14233A" text-anchor="middle" font-variant-numeric="tabular-nums">222.0</text>
  <line x1="230" y1="156" x2="700" y2="156" stroke="#C9D2DA" stroke-width="1"/>
</svg>
